# Smithery configuration for x402-bazaar-mcp
# Docs: https://smithery.ai/docs
#
# If Smithery scans the repo root (sukrutkrdg/402) rather than this subfolder,
# copy this file to the repo root or point Smithery at the `mcp` directory.

startCommand:
  type: stdio
  # Nothing is required — with no config the server runs on the FREE tier (one
  # call/day/service, then a preview), so users can try every tool instantly.
  # Add a prepaid credit token (recommended) or a wallet key to unlock paid calls.
  configSchema:
    type: object
    required: []
    properties:
      creditToken:
        type: string
        title: Prepaid credit token (recommended)
        description: >-
          A credit token (ck_…) from the buy-credits service. Sent as the
          x-credit-token header; each call debits your prepaid balance. No wallet
          or signing needed — the safest paid mode. Buy at https://402.com.tr.
      agentPrivateKey:
        type: string
        title: Agent wallet private key (alternative)
        description: >-
          Private key of a Base wallet holding USDC. Used locally to sign x402
          payments (gasless for the payer). Only used if no credit token is set.
          Use a dedicated low-balance wallet.
      catalogUrl:
        type: string
        title: Catalog URL
        default: https://402.com.tr/api/catalog
        description: Override the x402 Bazaar catalog endpoint (optional).
  commandFunction: |-
    (config) => ({
      command: "npx",
      args: ["-y", "x402-bazaar-mcp"],
      env: {
        ...(config.creditToken ? { X402_CREDIT_TOKEN: config.creditToken } : {}),
        ...(config.agentPrivateKey ? { AGENT_PRIVATE_KEY: config.agentPrivateKey } : {}),
        ...(config.catalogUrl ? { X402_BAZAAR_CATALOG: config.catalogUrl } : {})
      }
    })
